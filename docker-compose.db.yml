services:
  postgres:
    image: postgres:17-alpine
    container_name: jobtracker-postgres
    environment:
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker
      POSTGRES_DB: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - jobtracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtracker"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - jobtracker-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jobtracker-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - jobtracker-network

volumes:
  jobtracker-pgdata:

networks:
  jobtracker-network:
    driver: bridge
